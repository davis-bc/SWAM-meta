# config/slurm/small-batch/config.yaml
#
# Use this profile for runs with <50 samples.
# Each sample-parallel rule is submitted as its own Slurm job.
#
# Usage: snakemake --profile config/slurm/small-batch ...

# ----------------------------
#  Global Slurm limits
# ----------------------------

executor: slurm
scheduler: greedy

jobs: 100
cores: 1024

use-conda: true
conda-frontend: conda
keep-incomplete: true

# ----------------------------------------------------
#  Default resources (applied when not set explicitly)
# ----------------------------------------------------

default-resources:
  slurm_account: ""
  slurm_partition: ""
  mem_mb: 4000
  runtime: "0-06:00:00"

# No groups defined — each sample is submitted as an individual Slurm job.

# -----------------------------------------------------------
#  Per-rule thread allocation
# -----------------------------------------------------------

set-threads:
  short_reads: 16
  contigs: 32
  genomad: 32
  mobmess: 32
  prodigal: 1
  contig_amr: 16
  mge_annotation: 16
  mmseqs_taxonomy: 32
  contig_abundance: 16
  bin: 32
  mag_prodigal: 1
  mag_amr: 16
  mag_mge: 16
  mag_taxonomy: 64
  mag_metabolism: 64
  mag_qc: 16
  mag_abundance: 16

# -----------------------------------------------------------
#  Per-rule resource allocation
#  Each value is the allocation for a single-sample job.
# -----------------------------------------------------------

set-resources:
  # --- Short reads ---
  short_reads:
    mem_mb: 20000
    runtime: "0-10:00:00"

  # --- Assembly ---
  contigs:
    mem_mb: 150000
    runtime: "3-00:00:00"

  # --- Contig classification ---
  genomad:
    mem_mb: 150000
    runtime: "3-00:00:00"
  mobmess:
    mem_mb: 150000
    runtime: "1-00:00:00"

  # --- Contig annotation ---
  prodigal:
    mem_mb: 16000
    runtime: "0-04:00:00"
  contig_amr:
    mem_mb: 16000
    runtime: "0-06:00:00"
  mge_annotation:
    mem_mb: 16000
    runtime: "0-06:00:00"
  mmseqs_taxonomy:
    mem_mb: 64000
    runtime: "1-00:00:00"
  contig_abundance:
    mem_mb: 20000
    runtime: "0-06:00:00"

  # --- MAG binning / heavy per-sample jobs ---
  bin:
    mem_mb: 150000
    runtime: "1-00:00:00"
  mag_taxonomy:
    mem_mb: 150000
    runtime: "1-12:00:00"
  mag_metabolism:
    mem_mb: 150000
    runtime: "1-00:00:00"

  # --- MAG annotation / QC ---
  mag_prodigal:
    mem_mb: 16000
    runtime: "0-06:00:00"
  mag_amr:
    mem_mb: 16000
    runtime: "0-06:00:00"
  mag_mge:
    mem_mb: 16000
    runtime: "0-06:00:00"
  mag_qc:
    mem_mb: 32000
    runtime: "0-08:00:00"
  mag_abundance:
    mem_mb: 32000
    runtime: "0-04:00:00"
