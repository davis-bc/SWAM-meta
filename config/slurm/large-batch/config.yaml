# config/slurm/large-batch/config.yaml
#
# Use this profile for runs with >=50 samples.
# Selected lightweight per-sample annotation/QC rules are batched into a
# single Slurm job, while heavy assembly, taxonomy, and binning rules remain
# one job per sample.
#
# Usage: snakemake --profile config/slurm/large-batch ...

# ----------------------------
#  Global Slurm limits
# ----------------------------

executor: slurm
scheduler: greedy

jobs: 100
cores: 1024

use-conda: true
conda-frontend: conda
keep-incomplete: true

# ----------------------------------------------------
#  Default resources (applied when not set explicitly)
# ----------------------------------------------------

default-resources:
  slurm_account: ""
  slurm_partition: ""
  mem_mb: 4000
  runtime: 360

# -----------------------------------------------------------
#  Groups — batch lightweight sample-parallel rules
# -----------------------------------------------------------

groups:
  contig_amr: "contig_amr"
  mge_annotation: "mge_annotation"
  mag_amr: "mag_amr"
  mag_mge: "mag_mge"
  mag_qc: "mag_qc"
  mag_abundance: "mag_abundance"

# -----------------------------------------------------------
#  Batch size — number of samples per grouped Slurm job
#  Resources below are summed across all samples in a batch.
# -----------------------------------------------------------

group-components:
  contig_amr: 8
  mge_annotation: 8
  mag_amr: 8
  mag_mge: 8
  mag_qc: 4
  mag_abundance: 4

# -----------------------------------------------------------
#  Per-rule thread allocation
#  These override the in-rule `threads:` directive.
# -----------------------------------------------------------

set-threads:
  short_reads: 16
  contigs: 32
  genomad: 32
  mobmess: 32
  prodigal: 1
  contig_amr: 16
  mge_annotation: 16
  mmseqs_taxonomy: 32
  contig_abundance: 16
  bin: 32
  mag_prodigal: 1
  mag_amr: 16
  mag_mge: 16
  mag_taxonomy: 64
  mag_metabolism: 64
  mag_qc: 16
  mag_abundance: 16

# -----------------------------------------------------------
#  Per-rule resource allocation
#  mem_mb: memory in MB per job
#  runtime: wall-clock limit in Slurm format (d-hh:mm:ss)
#  Grouped rules: Slurm total = value x group-components
# -----------------------------------------------------------

set-resources:
  # --- Short reads ---
  short_reads:
    mem_mb: 20000
    runtime: 600

  # --- Assembly / heavy per-sample jobs (not grouped) ---
  contigs:
    mem_mb: 150000
    runtime: 4320
  genomad:
    mem_mb: 150000
    runtime: 4320
  mobmess:
    mem_mb: 150000
    runtime: 1440
  mmseqs_taxonomy:
    mem_mb: 64000
    runtime: 1440
  contig_abundance:
    mem_mb: 20000
    runtime: 360
  bin:
    mem_mb: 150000
    runtime: 1440
  mag_taxonomy:
    mem_mb: 150000
    runtime: 2160
  mag_metabolism:
    mem_mb: 150000
    runtime: 1440

  # --- Lightweight contig annotation (grouped) ---
  prodigal:
    mem_mb: 16000
    runtime: 240
  contig_amr:
    mem_mb: 16000
    runtime: 360
  mge_annotation:
    mem_mb: 16000
    runtime: 360

  # --- Lightweight MAG annotation / QC (grouped) ---
  mag_prodigal:
    mem_mb: 16000
    runtime: 360
  mag_amr:
    mem_mb: 16000
    runtime: 360
  mag_mge:
    mem_mb: 16000
    runtime: 360
  mag_qc:
    mem_mb: 32000
    runtime: 480
  mag_abundance:
    mem_mb: 32000
    runtime: 240
